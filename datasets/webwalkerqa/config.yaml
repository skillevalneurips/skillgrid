_base_: ../../configs/base.yaml

dataset:
  name: webwalkerqa
  max_test_samples: 50
  split_seed: 42
  judge_model: gpt-4o-mini

experiment:
  name: webwalker_axes_full
  protocol: gaia_react
  max_episodes: 50
  max_steps_per_episode: 20
  num_evolution_rounds: 1
  max_skills: 8
  retrieval_bundle_size: 3
  react:
    visibility: labels
    enable_verify: true
    lb_sample_size: 2
    lb_seed: 42
  gaia_react:
    python_timeout: 90
    max_exec_output_chars: 12000
    trace_dir: outputs/reasoning_traces/webwalkerqa
    domain: webwalkerqa
  skill_creation:
    probe_tasks: 5
